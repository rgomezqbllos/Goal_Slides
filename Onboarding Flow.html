  /* Slide transitions */
  .slide-enter { animation: slideIn 0.45s cubic-bezier(0.22,1,0.36,1) forwards; }
  .slide-exit  { animation: slideOut 0.35s cubic-bezier(0.55,0,1,0.45) forwards; }
  @keyframes slideIn  { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
  @keyframes slideOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(-40px); } }
  .slide-enter-back { animation: slideInBack 0.45s cubic-bezier(0.22,1,0.36,1) forwards; }
  @keyframes slideInBack { from { opacity:0; transform:translateX(-40px); } to { opacity:1; transform:translateX(0); } }

  /* Checkbox */
  .check-item { cursor: pointer; }
  .check-item:hover .check-box { border-color: #42dcc6; background: rgba(66,220,198,0.08); }

  /* Tweaks panel */
  #tweaks-panel {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    background: #111633; border: 1.5px solid #464a6c; padding: 20px;
    width: 260px; display: none; flex-direction: column; gap: 14px;
  }
  #tweaks-panel.visible { display: flex; }

  /* Input fields */
  .gs-input {
    background: #0d1228; border: 1.5px solid #464a6c; color: #dde4e1;
    font-family: 'Space Grotesk', sans-serif; font-size: 14px;
    padding: 10px 14px; outline: none; width: 100%; transition: border-color 0.2s;
  }
  .gs-input:focus { border-color: #42dcc6; }
  .gs-input::placeholder { color: #859490; }

  /* Select */
  .gs-select {
    background: #0d1228; border: 1.5px solid #464a6c; color: #dde4e1;
    font-family: 'Space Grotesk', sans-serif; font-size: 14px;
    padding: 10px 14px; outline: none; width: 100%; cursor: pointer;
    appearance: none;
  }
  .gs-select:focus { border-color: #42dcc6; }

  /* Toggle */
  .gs-toggle { position:relative; width:40px; height:22px; }
  .gs-toggle input { opacity:0; width:0; height:0; }
  .gs-slider {
    position:absolute; inset:0; background:#464a6c; cursor:pointer; transition:0.25s;
  }
  .gs-slider:before {
    content:''; position:absolute; height:16px; width:16px; left:3px; bottom:3px;
    background:#859490; transition:0.25s;
  }
  .gs-toggle input:checked + .gs-slider { background: rgba(66,220,198,0.25); }
  .gs-toggle input:checked + .gs-slider:before { background:#42dcc6; transform:translateX(18px); }

  /* Pill badge */
  .gs-pill {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 3px 10px; border: 1px solid currentColor;
  }

  /* Card */
  .gs-card {
    background: #0d1228; border: 1.5px solid #1c2341; padding: 20px;
    transition: border-color 0.2s;
  }
  .gs-card:hover { border-color: #464a6c; }
  .gs-card.selected { border-color: #42dcc6; background: rgba(66,220,198,0.05); }

  /* Scrollable area */
  .scroll-area { overflow-y: auto; scrollbar-width: thin; scrollbar-color: #464a6c transparent; }
  .scroll-area::-webkit-scrollbar { width: 4px; }
  .scroll-area::-webkit-scrollbar-thumb { background: #464a6c; }

  /* Number input */
  .gs-num { background: #0d1228; border: 1.5px solid #464a6c; color: #dde4e1;
    font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700;
    padding: 10px 14px; outline: none; width: 90px; text-align: center;
    -moz-appearance: textfield;
  }
  .gs-num::-webkit-outer-spin-button, .gs-num::-webkit-inner-spin-button { -webkit-appearance: none; }
  .gs-num:focus { border-color: #42dcc6; }

// ─── Helpers ──────────────────────────────────────────────────────────────────
const Icon = ({ name, size = 20, style = {} }) => (
  <span className="material-symbols-outlined" style={{ fontSize: size, lineHeight:1, display:'inline-block', fontVariationSettings:"'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24", ...style }}>
    {name}
  </span>
);

const Pill = ({ children, color = '#42dcc6' }) => (
  <span className="gs-pill" style={{ color, borderColor: color }}>{children}</span>
);

// ─── Progress Bar ─────────────────────────────────────────────────────────────
const ProgressBar = ({ step, total, labels }) => (
  <div style={{ display:'flex', alignItems:'center', gap:0, width:'100%' }}>
    {labels.map((label, i) => {
      const done = i < step;
      const active = i === step;
      return (
        <React.Fragment key={i}>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}>
            <div style={{
              width: 28, height: 28, border: `2px solid ${done || active ? '#42dcc6' : '#464a6c'}`,
              background: done ? '#42dcc6' : active ? 'rgba(66,220,198,0.1)' : 'transparent',
              display:'flex', alignItems:'center', justifyContent:'center',
              transition: 'all 0.3s',
            }}>
              {done
                ? <Icon name="check" size={14} style={{ color:'#00001b' }} />
                : <span style={{ fontSize:11, fontWeight:700, color: active ? '#42dcc6' : '#859490' }}>{i+1}</span>
              }
            </div>
            <span style={{ fontSize:10, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', color: active ? '#42dcc6' : done ? '#bbcac5' : '#859490', whiteSpace:'nowrap' }}>
              {label}
            </span>
          </div>
          {i < total - 1 && (
            <div style={{ flex:1, height:2, background: done ? '#42dcc6' : '#464a6c', margin:'0 4px', marginBottom:22, transition:'background 0.4s' }} />
          )}
        </React.Fragment>
      );
    })}
  </div>
);

  return (
    <div style={{ display:'flex', gap:48, height:'100%' }}>
      <div style={{ flex:'0 0 320px', display:'flex', flexDirection:'column', gap:20, paddingTop:4 }}>

            <div style={{ position:'absolute', left:9, top:12, bottom:12, width:2, background:'#1c2341' }}/>
            <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
              {t.su_phases.map((ph,i) => {
                const active = phases[ph.id]!==undefined ? phases[ph.id] : ph.active;
                return (
                  <div key={ph.id} onClick={() => setPhase(ph.id, !active)} style={{ display:'flex', alignItems:'flex-start', gap:14, cursor:'pointer', position:'relative' }}>
                    {/* Node */}
                    <div style={{ position:'absolute', left:-28, top:0, width:20, height:20, border:`2px solid ${active?'#42dcc6':'#464a6c'}`, background:active?'#42dcc6':'#00001b', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1 }}>
                      {active && <Icon name="check" size={11} style={{ color:'#003730' }}/>}
                    </div>
                    <div className="gs-card" style={{ flex:1, borderColor:active?'#464a6c':'#1c2341', background:active?'#0d1228':'transparent' }}>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                        <span style={{ fontSize:13, fontWeight:600, color: active?'#dde4e1':'#859490' }}>{ph.label}</span>
                        {active && <Pill color="#42dcc6">{t.su_ready}</Pill>}
                      </div>
                      <p style={{ fontSize:11, color:'#859490', marginTop:4 }}>{ph.desc}</p>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── STEP 5: Launch ───────────────────────────────────────────────────────────
const StepLaunch = ({ t, state }) => {
  const p = state.params || {};
  const stats = [
    { label: t.la_stats[0].label, val: p.fleet || '—' },
    { label: t.la_stats[1].label, val: p.routes || '—' },
    { label: t.la_stats[2].label, val: p.depots || '—' },
  ];
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', textAlign:'center', gap:32 }}>
      {/* Animated icon */}
      <div style={{ position:'relative', width:120, height:120 }}>
        <div style={{ position:'absolute', inset:0, border:'2px solid #42dcc6', animation:'spin 8s linear infinite', opacity:0.3 }} />
        <div style={{ position:'absolute', inset:10, border:'1px solid #42dcc6', animation:'spin 5s linear infinite reverse', opacity:0.5 }} />
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <Icon name="check_circle" size={52} style={{ color:'#42dcc6' }}/>
        </div>
      </div>
      <style>{`@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }`}</style>
      <div>
        <img src="assets/goal-logo-white.png" alt="Goal" style={{ height:32, width:'auto', margin:'0 auto 18px', display:'block', opacity:0.6 }}/>
        <p style={{ fontSize:11, fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'#42dcc6', marginBottom:12 }}>SYSTEM READY</p>
        <h1 style={{ fontSize:48, fontWeight:900, color:'#dde4e1', lineHeight:1.05, letterSpacing:'-0.01em' }}>{t.la_title}</h1>
        <p style={{ fontSize:16, color:'#bbcac5', marginTop:14, maxWidth:440, margin:'14px auto 0' }}>{t.la_sub}</p>
      </div>
      {/* Stats */}
      <div style={{ display:'flex', gap:0 }}>
        {stats.map((s,i) => (
          <div key={i} style={{ padding:'16px 36px', borderLeft:i>0?'1px solid #1c2341':'none', textAlign:'center' }}>
            <div style={{ fontSize:28, fontWeight:800, color:'#42dcc6' }}>{s.val}</div>
            <div style={{ fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase', color:'#859490', marginTop:4 }}>{s.label}</div>
          </div>
        ))}
      </div>
      {/* CTAs */}
      <div style={{ display:'flex', gap:14 }}>
        <button style={{ background:'#42dcc6', color:'#003730', border:'none', cursor:'pointer', fontFamily:'Space Grotesk', fontSize:14, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', padding:'14px 32px', display:'flex', alignItems:'center', gap:10 }}
          onMouseEnter={e=>e.currentTarget.style.background='#67f9e2'}
          onMouseLeave={e=>e.currentTarget.style.background='#42dcc6'}>
          <Icon name="open_in_new" size={17} style={{ color:'#003730' }} />
          {t.la_cta}
        </button>
        <button style={{ background:'transparent', color:'#bbcac5', border:'1.5px solid #464a6c', cursor:'pointer', fontFamily:'Space Grotesk', fontSize:14, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', padding:'14px 28px' }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='#42dcc6';e.currentTarget.style.color='#42dcc6'}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='#464a6c';e.currentTarget.style.color='#bbcac5'}}>
          {t.la_doc}
        </button>
      </div>
    </div>
  );
};

// ─── App Shell ────────────────────────────────────────────────────────────────
function App() {
  const TOTAL = 6; // 0=welcome, 1=training, 2=params, 3=config, 4=support, 5=launch
  const saved = JSON.parse(localStorage.getItem('gs_onboard')||'{}');
  const [step, setStep] = useState(saved.step||0);
  const [dir, setDir] = useState('fwd'); // fwd | bwd
  const [lang, setLang] = useState(saved.lang||'en');
  const [state, setGlobalState] = useState(saved.state||{});
  const [animKey, setAnimKey] = useState(0);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [accentColor, setAccentColor] = useState(saved.accent||'#42dcc6');

  const t = T[lang];

  // Persist
  useEffect(() => {
    localStorage.setItem('gs_onboard', JSON.stringify({ step, lang, state, accent:accentColor }));
  }, [step, lang, state, accentColor]);

  // Keyboard nav
  useEffect(() => {
    const handler = e => {
      if (e.key === 'ArrowRight' || e.key === 'Enter') goNext();
      if (e.key === 'ArrowLeft') goBack();
      if (e.key === 'Escape') setTweaksOpen(false);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [step]);

  const go = (n, d) => {
    setDir(d);
    setAnimKey(k => k+1);
    setStep(n);
  };
  const goNext = () => { if (step < TOTAL-1) go(step+1,'fwd'); };
  const goBack = () => { if (step > 0) go(step-1,'bwd'); };

  const stepComponents = [
    <StepWelcome key={0} t={t} params={state.params} onNext={goNext}/>,
    <StepTraining key={1} t={t} state={state} setState={setGlobalState}/>,
    <StepParametrization key={2} t={t} state={state} setState={setGlobalState}/>,
    <StepConfiguration key={3} t={t} state={state} setState={setGlobalState}/>,
    <StepSupport key={4} t={t} state={state} setState={setGlobalState}/>,
    <StepLaunch key={5} t={t} state={state}/>,
  ];

  const isLast = step === TOTAL-1;
  const isFirst = step === 0;

  // RTL support for Arabic
  useEffect(() => {
    const isRTL = lang === 'ar';
    document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
    document.documentElement.lang = lang;
  }, [lang]);

  // Expose global step navigator for PPTX capture
  useEffect(() => {
    window.__gsGoToStep = (n) => go(n, n >= step ? 'fwd' : 'bwd');
    window.__gsSetLang = (l) => setLang(l);
  });

  // Register tweaks listener
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <div style={{ position:'relative', zIndex:1, height:'100vh', display:'flex', flexDirection:'column' }}>

      {/* ── Top bar ── */}
      <div style={{ height:60, borderBottom:'1px solid #1c2341', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 32px', flexShrink:0, background:'#00001b' }}>
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <img src="assets/goal-logo-white.png" alt="Goal" style={{ height:28, width:'auto', display:'block' }}/>
          <div style={{ width:1, height:18, background:'#464a6c' }}/>
          <span style={{ fontSize:11, color:'#859490', letterSpacing:'0.04em' }}>{t.tagline}</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:20 }}>
          {/* Lang toggle */}
          <div style={{ display:'flex', border:'1px solid #464a6c', overflow:'hidden' }}>
            {['en','es','pt','it','fr','nl','ar'].map(l => (
              <button key={l} onClick={()=>setLang(l)} style={{ padding:'5px 10px', fontSize:10, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', cursor:'pointer', fontFamily:'Space Grotesk', border:'none', borderLeft: l!=='en'?'1px solid #464a6c':'none', background:lang===l?accentColor:'transparent', color:lang===l?'#003730':'#859490', transition:'all 0.2s' }}>{l}</button>
            ))}
          </div>
          {/* Step counter */}
          {step > 0 && <span style={{ fontSize:11, color:'#859490', letterSpacing:'0.06em' }}>{t.progress(step, TOTAL-1)}</span>}
        </div>
      </div>

      {/* ── Progress (steps 1-4) ── */}
      {step > 0 && step < TOTAL-1 && (
        <div style={{ padding:'20px 80px 16px', borderBottom:'1px solid #111633', flexShrink:0, background:'#00001b' }}>
          <ProgressBar step={step-1} total={TOTAL-2} labels={t.steps.slice(1,-1)} />
        </div>
      )}

      {/* ── Content ── */}
      <div style={{ flex:1, overflow:'hidden', padding: step===0 || step===TOTAL-1 ? '32px 64px' : '24px 64px' }}>
        <div key={animKey} className={dir==='fwd' ? 'slide-enter' : 'slide-enter-back'} style={{ height:'100%' }}>
          {stepComponents[step]}
        </div>
      </div>

      {/* ── Bottom nav ── */}
      {!isFirst && (
        <div style={{ height:72, borderTop:'1px solid #1c2341', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 64px', flexShrink:0, background:'#00001b' }}>
          <button onClick={goBack} style={{ background:'transparent', border:'1.5px solid #464a6c', color:'#bbcac5', cursor:'pointer', fontFamily:'Space Grotesk', fontSize:13, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', padding:'10px 24px', display:'flex', alignItems:'center', gap:8, transition:'border-color 0.2s' }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=accentColor;e.currentTarget.style.color=accentColor}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#464a6c';e.currentTarget.style.color='#bbcac5'}}>
            <Icon name="arrow_back" size={16}/> {t.back}
          </button>
          <div style={{ display:'flex', alignItems:'center', gap:14 }}>
            <span style={{ fontSize:10, color:'#859490', letterSpacing:'0.06em' }}>↑↓ / ←→ navigate</span>
            {!isLast && (
              <button onClick={() => go(TOTAL-1,'fwd')} style={{ background:'transparent', border:'none', color:'#859490', cursor:'pointer', fontFamily:'Space Grotesk', fontSize:12, fontWeight:600, letterSpacing:'0.06em', textTransform:'uppercase', padding:'10px', transition:'color 0.2s' }}
                onMouseEnter={e=>e.currentTarget.style.color=accentColor}
                onMouseLeave={e=>e.currentTarget.style.color='#859490'}>
                {t.skip} →
              </button>
            )}
            {!isLast && (
              <button onClick={goNext} style={{ background:accentColor, color:'#003730', border:'none', cursor:'pointer', fontFamily:'Space Grotesk', fontSize:13, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase', padding:'11px 28px', display:'flex', alignItems:'center', gap:8, transition:'background 0.2s' }}
                onMouseEnter={e=>e.currentTarget.style.background='#67f9e2'}
                onMouseLeave={e=>e.currentTarget.style.background=accentColor}>
                {t.next} <Icon name="arrow_forward" size={16} style={{ color:'#003730' }}/>
              </button>
            )}
          </div>
        </div>
      )}

      {/* ── Tweaks Panel ── */}
      <div id="tweaks-panel" className={tweaksOpen ? 'visible' : ''}>
        <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color:'#42dcc6', borderBottom:'1px solid #464a6c', paddingBottom:12, marginBottom:4 }}>Tweaks</div>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          <label style={{ fontSize:11, color:'#859490', textTransform:'uppercase', letterSpacing:'0.08em' }}>Accent Color</label>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            {['#42dcc6','#67f9e2','#bec5eb','#fae374','#83e287'].map(c => (
              <div key={c} onClick={() => setAccentColor(c)} style={{ width:22, height:22, background:c, cursor:'pointer', border:accentColor===c?'2px solid #dde4e1':'2px solid transparent', transition:'border 0.2s' }}/>
            ))}
          </div>
          <label style={{ fontSize:11, color:'#859490', textTransform:'uppercase', letterSpacing:'0.08em', marginTop:4 }}>Language</label>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {['en','es','pt','it','fr','nl','ar'].map(l => (
              <button key={l} onClick={()=>setLang(l)} style={{ padding:'5px 8px', fontSize:10, fontWeight:700, letterSpacing:'0.06em', textTransform:'uppercase', cursor:'pointer', fontFamily:'Space Grotesk', border:`1.5px solid ${lang===l?'#42dcc6':'#464a6c'}`, background:lang===l?'rgba(66,220,198,0.1)':'transparent', color:lang===l?'#42dcc6':'#859490', transition:'all 0.2s' }}>{l.toUpperCase()}</button>
            ))}
          </div>
          <label style={{ fontSize:11, color:'#859490', textTransform:'uppercase', letterSpacing:'0.08em', marginTop:4 }}>Jump to Step</label>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {[0,1,2,3,4,5].map(n => (
              <button key={n} onClick={() => go(n, n>step?'fwd':'bwd')} style={{ padding:'4px 10px', fontSize:11, fontWeight:700, cursor:'pointer', fontFamily:'Space Grotesk', border:`1.5px solid ${step===n?'#42dcc6':'#464a6c'}`, background:step===n?'rgba(66,220,198,0.1)':'transparent', color:step===n?'#42dcc6':'#859490', transition:'all 0.2s' }}>
                {n===0?'W':n===5?'✓':n}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
