<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Goal Systems — KPI Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: #00001b;
    color: #dde4e1;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(66,220,198,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(66,220,198,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .gs-pill {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 3px 10px; border: 1px solid currentColor;
    white-space: nowrap; display: inline-block;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="kpi-counter.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "from": 0,
  "to": 94.7,
  "duration": 2000,
  "decimals": 1,
  "format": "number",
  "prefix": "",
  "suffix": "%",
  "caption": "On-time arrivals",
  "size": "xl",
  "align": "center",
  "easing": "ease-out",
  "showProgress": false,
  "stop1At": 0,   "stop1Color": "#ff7775",
  "stop2At": 60,  "stop2Color": "#fae374",
  "stop3At": 85,  "stop3Color": "#83e287",
  "stop4At": 95,  "stop4Color": "#42dcc6"
}/*EDITMODE-END*/;

// Editor-mode init: when opened via the slide editor's modal, the saved
// tweaks come in via the URL hash and the studio needs to know to render the
// "Use in slide" return bar.
(function applyHashTweaks() {
  try {
    const m = (location.hash || '').match(/(?:^#|&)tweaks=([^&]+)/);
    if (!m) return;
    const data = JSON.parse(decodeURIComponent(m[1]));
    if (!data || typeof data !== 'object') return;
    // The editor-side tweaks store colorStops as an array. Flatten to
    // stopNAt/stopNColor so the studio's flat tweaks editor can edit them.
    if (Array.isArray(data.colorStops)) {
      data.colorStops.slice(0, 6).forEach((s, i) => {
        data[`stop${i+1}At`]    = s.at;
        data[`stop${i+1}Color`] = s.color;
      });
      delete data.colorStops;
    }
    Object.assign(TWEAK_DEFAULTS, data);
  } catch (e) { /* ignore */ }
})();
const FROM_EDITOR = /(?:^|[?&])from=editor(?:&|$)/.test(location.search || '');

function tweaksToColorStops(t) {
  const out = [];
  for (let i = 1; i <= 6; i++) {
    const at = t[`stop${i}At`];
    const color = t[`stop${i}Color`];
    if (at !== undefined && color) out.push({ at: parseFloat(at), color });
  }
  return out;
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const colorStops = useMemo(() => tweaksToColorStops(t), [
    t.stop1At, t.stop1Color, t.stop2At, t.stop2Color,
    t.stop3At, t.stop3Color, t.stop4At, t.stop4Color,
    t.stop5At, t.stop5Color, t.stop6At, t.stop6Color,
  ]);
  // Flat tweaks → array shape the editor expects on send-back.
  const tweaksForEditor = useMemo(() => ({ ...t, colorStops }), [t, colorStops]);

  return (
    <div style={{ position:'relative', zIndex:1, minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      {FROM_EDITOR && <EditorReturnBar tweaks={tweaksForEditor} />}
      <Header />
      <main style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:'48px' }}>
        <div style={{ width:'100%', maxWidth:1180, display:'grid', gridTemplateColumns:'1fr 1.4fr', gap:48, alignItems:'stretch' }}>
          <SidePanel t={t} colorStops={colorStops} />
          <DiagramFrame>
            <KPICounter
              from={t.from}
              to={t.to}
              duration={t.duration}
              decimals={t.decimals}
              format={t.format}
              prefix={t.prefix}
              suffix={t.suffix}
              caption={t.caption}
              size={t.size}
              align={t.align}
              easing={t.easing}
              showProgress={t.showProgress}
              colorStops={colorStops}
            />
          </DiagramFrame>
        </div>
      </main>

      <TweaksPanel>
        <TweakSection label="Value" />
        <TweakSlider label="From" value={t.from} min={0} max={1000} step={0.1}
                     onChange={v => setTweak('from', v)} />
        <TweakSlider label="To"   value={t.to}   min={0} max={1000} step={0.1}
                     onChange={v => setTweak('to', v)} />
        <TweakSelect label="Format" value={t.format}
                     options={['number','integer','time','date']}
                     onChange={v => setTweak('format', v)} />
        <TweakSlider label="Decimals" value={t.decimals} min={0} max={6} step={1}
                     onChange={v => setTweak('decimals', v)} />
        <TweakText  label="Prefix" value={t.prefix} onChange={v => setTweak('prefix', v)} />
        <TweakText  label="Suffix" value={t.suffix} onChange={v => setTweak('suffix', v)} />

        <TweakSection label="Animation" />
        <TweakSlider label="Duration (ms)" value={t.duration} min={0} max={8000} step={50}
                     onChange={v => setTweak('duration', v)} />
        <TweakSelect label="Easing" value={t.easing}
                     options={['linear','ease-in','ease-out','ease-in-out']}
                     onChange={v => setTweak('easing', v)} />
        <TweakToggle label="Show progress bar" value={t.showProgress}
                     onChange={v => setTweak('showProgress', v)} />

        <TweakSection label="Style" />
        <TweakRadio  label="Size"  value={t.size}  options={['sm','md','lg','xl']}
                     onChange={v => setTweak('size', v)} />
        <TweakRadio  label="Align" value={t.align} options={['left','center','right']}
                     onChange={v => setTweak('align', v)} />

        <TweakSection label="Color thresholds" />
        {[1,2,3,4].map(i => (
          <React.Fragment key={i}>
            <TweakSlider label={`#${i} ≥`} value={t[`stop${i}At`] ?? 0} min={0} max={1000} step={0.1}
                         onChange={v => setTweak(`stop${i}At`, v)} />
            <TweakText   label={`#${i} color`} value={t[`stop${i}Color`] || ''}
                         onChange={v => setTweak(`stop${i}Color`, v)} />
          </React.Fragment>
        ))}

        <TweakSection label="Caption" />
        <TweakText label="Text" value={t.caption} onChange={v => setTweak('caption', v)} />
      </TweaksPanel>
    </div>
  );
}

// ─── Editor-mode return bar ──────────────────────────────────────────────────
function EditorReturnBar({ tweaks }) {
  const send = (type) => {
    try {
      window.parent.postMessage(
        type === 'select'
          ? { type: 'gs:diagram-pick:select', diagramId: 'kpi', tweaks }
          : { type: 'gs:diagram-pick:cancel' },
        '*'
      );
    } catch (e) { /* ignore */ }
  };
  return (
    <div style={{
      position:'sticky', top:0, zIndex:50,
      background:'rgba(66,220,198,0.10)',
      borderBottom:'1px solid #42dcc6',
      padding:'10px 48px',
      display:'flex', alignItems:'center', justifyContent:'space-between',
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <span className="material-symbols-outlined" style={{ fontSize:18, color:'#42dcc6' }}>speed</span>
        <span style={{ fontSize:11, fontWeight:700, letterSpacing:'0.12em', color:'#42dcc6', textTransform:'uppercase' }}>
          Configuring KPI for slide
        </span>
        <span style={{ fontSize:10, color:'#859490', letterSpacing:'0.06em' }}>
          · adjust tweaks below, then insert
        </span>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <button onClick={() => send('cancel')} style={{
          background:'transparent', border:'1px solid #464a6c', color:'#bbcac5',
          padding:'7px 14px', cursor:'pointer', fontFamily:"'Space Grotesk', sans-serif",
          fontSize:11, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase',
        }}>Cancel</button>
        <button onClick={() => send('select')} style={{
          background:'#42dcc6', border:'1px solid #42dcc6', color:'#003730',
          padding:'7px 16px', cursor:'pointer', fontFamily:"'Space Grotesk', sans-serif",
          fontSize:11, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase',
          display:'flex', alignItems:'center', gap:6,
        }}>
          <span className="material-symbols-outlined" style={{ fontSize:14 }}>check</span>
          Use in slide
        </button>
      </div>
    </div>
  );
}

function Header() {
  return (
    <header style={{ padding:'24px 48px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'1px solid #1c2341' }}>
      <div style={{ display:'flex', alignItems:'center', gap:14 }}>
        <a href="Diagram Library.html" style={{ display:'flex', alignItems:'center', gap:14, textDecoration:'none' }}>
          <img src="assets/goal-logo-white.png" alt="Goal" style={{ height:24, opacity:0.95 }}/>
          <span style={{ width:1, height:18, background:'#464a6c' }} />
          <span style={{ fontSize:11, fontWeight:700, letterSpacing:'0.14em', color:'#42dcc6', textTransform:'uppercase' }}>
            Diagram Library
          </span>
        </a>
        <span style={{ fontSize:11, fontWeight:500, letterSpacing:'0.06em', color:'#859490', textTransform:'uppercase' }}>
          / KPI Counter · v0.1
        </span>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:16 }}>
        <span className="gs-pill" style={{ color:'#fae374', borderColor:'#fae374' }}>Animated</span>
        <span className="gs-pill" style={{ color:'#bec5eb', borderColor:'#bec5eb' }}>Parametric</span>
      </div>
    </header>
  );
}

function SidePanel({ t, colorStops }) {
  return (
    <aside style={{ display:'flex', flexDirection:'column', gap:24 }}>
      <div>
        <p style={{ fontSize:11, fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'#42dcc6', marginBottom:14 }}>
          DIAG-003 · KPI COUNTER
        </p>
        <h1 style={{ fontSize:48, fontWeight:900, lineHeight:1.05, letterSpacing:'-0.01em', color:'#dde4e1', marginBottom:18 }}>
          Counter that<br/>tells a story.
        </h1>
        <p style={{ fontSize:15, lineHeight:1.65, color:'#bbcac5', maxWidth:440 }}>
          Ramps from a start value to a target while passing through user-defined
          color thresholds. Format the value as number, integer, time or date,
          and add a prefix/suffix (<span style={{ color:'#fae374' }}>$, %, COP, USD…</span>).
        </p>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:0, border:'1px solid #1c2341' }}>
        {[
          { k: 'FROM',     v: String(t.from) },
          { k: 'TO',       v: String(t.to) },
          { k: 'FORMAT',   v: (t.format || 'number').toUpperCase() },
          { k: 'STOPS',    v: String(colorStops.length).padStart(2,'0') },
        ].map((s, i) => (
          <div key={s.k} style={{
            padding:'16px 18px',
            borderRight: i % 2 === 0 ? '1px solid #1c2341' : 'none',
            borderBottom: i < 2 ? '1px solid #1c2341' : 'none',
            background:'#0d1228',
          }}>
            <div style={{ fontSize:10, letterSpacing:'0.12em', color:'#859490', marginBottom:6 }}>{s.k}</div>
            <div style={{ fontSize:18, fontWeight:700, color:'#dde4e1', fontVariantNumeric:'tabular-nums' }}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Color stops legend */}
      <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
        <div style={{ fontSize:10, fontWeight:700, letterSpacing:'0.12em', color:'#859490', textTransform:'uppercase' }}>
          Color thresholds
        </div>
        {colorStops.map((s, i) => (
          <div key={i} style={{ display:'flex', alignItems:'center', gap:10, fontSize:13, color:'#bbcac5' }}>
            <div style={{ width:14, height:14, background:s.color, border:'1px solid #1c2341' }}/>
            <span style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:12, color:'#dde4e1', minWidth:60 }}>≥ {s.at}</span>
            <span style={{ fontFamily:"'JetBrains Mono', monospace", fontSize:11, color:'#859490' }}>{s.color}</span>
          </div>
        ))}
      </div>
    </aside>
  );
}

function DiagramFrame({ children }) {
  return (
    <div style={{
      background:'#0a0e22', border:'1.5px solid #1c2341',
      position:'relative', display:'flex', flexDirection:'column',
      minHeight: 480,
    }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
                    padding:'12px 16px', borderBottom:'1px solid #1c2341' }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span className="material-symbols-outlined" style={{ fontSize:14, color:'#42dcc6' }}>speed</span>
          <span style={{ fontSize:10, fontWeight:700, letterSpacing:'0.14em', color:'#42dcc6', textTransform:'uppercase' }}>
            KPI.LIVE
          </span>
        </div>
        <div style={{ display:'flex', gap:6 }}>
          {['#42dcc6','#fae374','#ff7775'].map((c,i) => <div key={i} style={{ width:8, height:8, background:c, opacity:0.7 }} />)}
        </div>
      </div>
      <div style={{ flex:1, position:'relative', display:'flex', alignItems:'stretch', justifyContent:'stretch' }}>
        {children}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
